<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inloggen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Biryani:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./login.css" />
</head>
<body>
  <form class="form-control" action="">
    <p class="title">Login</p>
    <p class="login-error" role="alert" aria-live="polite"></p>
    <div class="input-field">
      <input
        required=""
        class="input"
        type="text"
        id="username"
        name="username"
      />
      <label class="label" for="username">username</label>
    </div>
    <div class="input-field">
      <input
        required=""
        class="input"
        type="password"
        id="password"
        name="password"
      />
      <label class="label" for="password">Enter Password</label>
    </div>
    <button class="submit-btn">Sign In</button>
  </form>

  <script type="module" src="./login.ts"></script>
</body>
