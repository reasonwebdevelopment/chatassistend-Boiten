<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Chat Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Biryani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/dashboard-B1mjzQMW.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-Cf3xff8G.js">
    <link rel="stylesheet" crossorigin href="/assets/dashboard-DB62ELvR.css">
  </head>
  <body>
    <header>
      <span class="logo">BoitenLuhrs</span>
      <div class="sep"></div>
      <span class="subtitle">chat dashboard</span>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-pressed="false"
        aria-label="Schakel naar dagmodus"
        title="Schakel naar dagmodus"
      >
        ☀️
      </button>
    </header>

    <div id="conversations">
      <h3>Gesprekken</h3>
    </div>

    <div id="messages">
      <h3>Berichten</h3>
      <div id="messages-list">
        <div class="empty-state">
          <div class="icon">💬</div>
          <p>Selecteer een gesprek</p>
        </div>
      </div>
    </div>

  </body>
</html>
